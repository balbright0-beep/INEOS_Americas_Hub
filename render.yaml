services:
  - type: web
    name: ineos-americas-hub
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_ALLOCATIONS_URL
        sync: false
      - key: NEXT_PUBLIC_INCENTIVES_URL
        sync: false
      - key: NEXT_PUBLIC_DASHBOARD_URL
        sync: false
      - key: NEXT_PUBLIC_FLEET_URL
        sync: false
